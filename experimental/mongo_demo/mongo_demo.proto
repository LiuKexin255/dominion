syntax = "proto3";

package experimental.mongo_demo;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "dominion/experimental/mongo_demo";

service MongoDemoService {
  rpc GetMongoRecord(GetMongoRecordRequest) returns (MongoRecord) {
    option (google.api.http) = {
      get: "/v1/{name=apps/*/mongoRecords/*}"
    };

    option (google.api.method_signature) = "name";
  }

  rpc ListMongoRecords(ListMongoRecordsRequest) returns (ListMongoRecordsResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=apps/*}/mongoRecords"
    };

    option (google.api.method_signature) = "parent";
  }

  rpc CreateMongoRecord(CreateMongoRecordRequest) returns (MongoRecord) {
    option (google.api.http) = {
      post: "/v1/{parent=apps/*}/mongoRecords"
      body: "mongo_record"
    };

    option (google.api.method_signature) = "parent,mongo_record,mongo_record_id";
  }

  rpc UpdateMongoRecord(UpdateMongoRecordRequest) returns (MongoRecord) {
    option (google.api.http) = {
      patch: "/v1/{mongo_record.name=apps/*/mongoRecords/*}"
      body: "mongo_record"
    };

    option (google.api.method_signature) = "mongo_record,update_mask";
  }

  rpc DeleteMongoRecord(DeleteMongoRecordRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1/{name=apps/*/mongoRecords/*}"
    };

    option (google.api.method_signature) = "name";
  }
}

message MongoRecord {
  option (google.api.resource) = {
    type: "mongo-demo.liukexin.com/MongoRecord"
    pattern: "apps/{app}/mongoRecords/{mongo_record}"
    plural: "mongoRecords"
    singular: "mongoRecord"
  };

  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  string title = 2 [(google.api.field_behavior) = REQUIRED];

  string description = 3;

  map<string, string> labels = 4;

  repeated string tags = 5;

  MongoRecordProfile profile = 6;

  bool archived = 7;

  google.protobuf.Timestamp create_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  google.protobuf.Timestamp update_time = 9 [(google.api.field_behavior) = OUTPUT_ONLY];
}

message MongoRecordProfile {
  string owner = 1;

  int32 priority = 2;

  repeated string watchers = 3;
}

message GetMongoRecordRequest {
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "mongo-demo.liukexin.com/MongoRecord"
    }
  ];
}

message ListMongoRecordsRequest {
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "mongo-demo.liukexin.com/MongoRecord"
    }
  ];

  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  bool show_archived = 4 [(google.api.field_behavior) = OPTIONAL];
}

message ListMongoRecordsResponse {
  repeated MongoRecord mongo_records = 1;

  string next_page_token = 2;
}

message CreateMongoRecordRequest {
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "mongo-demo.liukexin.com/MongoRecord"
    }
  ];

  string mongo_record_id = 2 [(google.api.field_behavior) = REQUIRED];

  MongoRecord mongo_record = 3 [(google.api.field_behavior) = REQUIRED];
}

message UpdateMongoRecordRequest {
  MongoRecord mongo_record = 1 [(google.api.field_behavior) = REQUIRED];

  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = REQUIRED];
}

message DeleteMongoRecordRequest {
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "mongo-demo.liukexin.com/MongoRecord"
    }
  ];
}
