name: liukexin.demo
desc: "Mongo Demo CRUD 服务"
type: test
services:
  - infra:
      app: mongo-demo
      resource: mongodb
      profile: dev-single
      name: mongo
  - artifact:
      path: //experimental/golang/mongo_demo/cmd/service.yaml
      name: cmd
    http:
      hostnames:
        - mongo-demo.liukexin.com
      matches:
        - backend: http
          path:
            type: PathPrefix
            value: /v1
