app: grpc-hello-world
template: deploy
desc: "开发环境"
services:
  - artifact: 
      path: //experimental/grpc_hello_world/service/service.yaml
      name: service
  - artifact: 
      path: //experimental/grpc_hello_world/gateway/service.yaml
      name: gateway 
    http: 
      hostnames:
        - hello.liukexin.com
      matches:
        - path: 
            type: PathPrefix
            value: /v1