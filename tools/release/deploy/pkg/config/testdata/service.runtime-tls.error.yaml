name: service
app: grpc-hello-world
desc: grpc hello world service
artifacts:
  - name: service
    target: :service_image
    tls: true
    secret_name: grpc-hello-world-service-tls
    server_name: grpc-hello-world-service.default.svc.cluster.local
    ports:
      - name: grpc
        port: 50051
