# Schema definition for service YAML files.

$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Service"
type: object
description: "服务定义 schema"
additionalProperties: false
required:
  - name
  - app
  - desc 
  - artifact

properties:
  name:
    type: string
    minLength: 1
    description: "服务名"

  app:
    type: string
    minLength: 1
    description: "服务所属应用名"

  desc:
    type: string 
    minLength: 1
    description: "服务描述"

  artifact:
    type: array 
    description: "服务产物 target 列表，必须为 oci_image 对象，并且以 {artifact}_push 作为推送 target"
    minItems: 1
    items: 
      type: object 
      additionalProperties: false 
      required:
        - name 
        - target 
      properties:
        name: 
          type: string 
          minLength: 1
          description: "产物别名，用于在部署配置中引用"
        
        target:
          type: string 
          minLength: 1
          description: "bazel target 地址，相对路径以文件所在目录为基准"
          


  
