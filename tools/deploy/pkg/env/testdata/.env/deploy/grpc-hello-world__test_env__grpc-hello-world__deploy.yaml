template: deploy
app: grpc-hello-world
desc: 开发环境
uri: //deploy/grpc-hello-world/deploy.yaml
services:
- artifact:
    path: //service/service.yaml
    name: service
- artifact:
    path: //gateway/service.yaml
    name: gateway
  http:
    hostnames:
    - hello.liukexin.com
    matches:
    - backend: http
      path:
        type: PathPrefix
        value: /v1
