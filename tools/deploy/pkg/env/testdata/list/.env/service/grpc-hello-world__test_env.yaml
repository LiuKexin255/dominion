- name: service
  app: grpc-hello-world
  desc: service config
  uri: //service/service.yaml
  artifacts:
    - name: service
      type: deployment
      target: //service:service_image
      ports:
        - name: grpc
          port: 50051
    - name: service111
      type: deployment
      target: //service:service111_image
      ports:
        - name: grpc
          port: 50052
- name: gateway
  app: grpc-hello-world
  desc: gateway config
  uri: //gateway/service.yaml
  artifacts:
    - name: gateway
      type: deployment
      target: //gateway:gateway_image
      ports:
        - name: http
          port: 80
