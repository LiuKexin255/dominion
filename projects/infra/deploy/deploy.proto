syntax = "proto3";

package projects.infra.deploy;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "dominion/projects/infra/deploy";

// DeployService exposes the control-plane API for deployment environments.
//
// The service manages Environment resources as the system of record. Clients
// write desired_state through CreateEnvironment and UpdateEnvironment, while
// the server reconciles that state to Kubernetes asynchronously and reports the
// observed result through Environment.status.
service DeployService {
  // GetEnvironment returns the latest persisted Environment resource,
  // including its current observed status.
  rpc GetEnvironment(GetEnvironmentRequest) returns (Environment) {
    option (google.api.http) = {
      get: "/v1/{name=deploy/scopes/*/environments/*}"
    };

    option (google.api.method_signature) = "name";
  }

  // GetServiceEndpoints resolves the effective endpoints resource for an
  // app/service from the perspective of a specific environment.
  rpc GetServiceEndpoints(GetServiceEndpointsRequest) returns (ServiceEndpoints) {
    option (google.api.http) = {
      get: "/v1/{name=deploy/scopes/*/environments/*/apps/*/services/*/endpoints}"
    };

    option (google.api.method_signature) = "name";
  }

  // ListEnvironments lists Environment resources under a scope.
  rpc ListEnvironments(ListEnvironmentsRequest) returns (ListEnvironmentsResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=deploy/scopes/*}/environments"
    };

    option (google.api.method_signature) = "parent";
  }

  // CreateEnvironment creates a new Environment resource and accepts its
  // initial desired state.
  //
  // A successful response means the desired state has been accepted and
  // persisted. The actual deployment is performed asynchronously.
  rpc CreateEnvironment(CreateEnvironmentRequest) returns (Environment) {
    option (google.api.http) = {
      post: "/v1/{parent=deploy/scopes/*}/environments"
      body: "*"
    };

    option (google.api.method_signature) = "parent,environment,env_name";
  }

  // UpdateEnvironment updates the desired state of an existing Environment.
  //
  // A successful response means the new desired state has been accepted and
  // persisted. The server reconciles the updated state asynchronously.
  rpc UpdateEnvironment(UpdateEnvironmentRequest) returns (Environment) {
    option (google.api.http) = {
      patch: "/v1/{environment.name=deploy/scopes/*/environments/*}"
      body: "*"
    };

    option (google.api.method_signature) = "environment,update_mask";
  }

  // DeleteEnvironment deletes an Environment resource and triggers cleanup of
  // the deployment resources owned by that environment.
  rpc DeleteEnvironment(DeleteEnvironmentRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1/{name=deploy/scopes/*/environments/*}"
    };

    option (google.api.method_signature) = "name";
  }
}

message Environment {
  option (google.api.resource) = {
    type: "infra.liukexin.com/deploy/Environment"
    pattern: "deploy/scopes/{scope}/environments/{env_name}"
    plural: "environments"
    singular: "environment"
  };

  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  string description = 2;

  EnvironmentDesiredState desired_state = 3 [(google.api.field_behavior) = REQUIRED];

  EnvironmentStatus status = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  google.protobuf.Timestamp create_time = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  google.protobuf.Timestamp update_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  string etag = 7;

  EnvironmentType type = 8;
}

// ServiceEndpoints is a computed resource that describes the currently
// effective runtime endpoints and service port map for a logical app/service
// from the perspective of an environment.
message ServiceEndpoints {
  option (google.api.resource) = {
    type: "infra.liukexin.com/deploy/ServiceEndpoints"
    pattern: "deploy/scopes/{scope}/environments/{env_name}/apps/{app}/services/{service}/endpoints"
    plural: "serviceEndpoints"
    singular: "serviceEndpoints"
  };

  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  repeated string endpoints = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  map<string, int32> ports = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  string resolved_scope = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  string resolved_environment = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  ResolutionMode resolution_mode = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  repeated StatefulServiceInstance stateful_instances = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  bool is_stateful = 8 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// StatefulServiceInstance describes a single instance of a stateful service,
// identified by its ordinal index within the StatefulSet.
message StatefulServiceInstance {
  int32 index = 1;

  repeated string endpoints = 2;
}

message EnvironmentDesiredState {
  repeated ArtifactSpec artifacts = 1;

  repeated InfraSpec infras = 2;
}

message EnvironmentStatus {
  EnvironmentState state = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  string message = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  google.protobuf.Timestamp last_reconcile_time = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  google.protobuf.Timestamp last_success_time = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
}

enum EnvironmentState {
  ENVIRONMENT_STATE_UNSPECIFIED = 0;
  ENVIRONMENT_STATE_PENDING = 1;
  ENVIRONMENT_STATE_RECONCILING = 2;
  ENVIRONMENT_STATE_READY = 3;
  ENVIRONMENT_STATE_FAILED = 4;
  ENVIRONMENT_STATE_DELETING = 5;
}

enum EnvironmentType {
  ENVIRONMENT_TYPE_UNSPECIFIED = 0;
  ENVIRONMENT_TYPE_PROD = 1;
  ENVIRONMENT_TYPE_TEST = 2;
  ENVIRONMENT_TYPE_DEV = 3;
}

enum ServiceEndpointsView {
  SERVICE_ENDPOINTS_VIEW_UNSPECIFIED = 0;
  SERVICE_ENDPOINTS_VIEW_BASIC = 1;
  SERVICE_ENDPOINTS_VIEW_RESOLUTION = 2;
}

enum ResolutionMode {
  RESOLUTION_MODE_UNSPECIFIED = 0;
  RESOLUTION_MODE_SAME_ENV = 1;
  RESOLUTION_MODE_PROD_FALLBACK = 2;
}

message ArtifactSpec {
  string name = 1;

  string app = 2;

  string image = 3;

  repeated ArtifactPortSpec ports = 4;

  int32 replicas = 5;

  bool tls_enabled = 6;

  ArtifactHTTPSpec http = 7;

  WorkloadKind workload_kind = 8;
}

message ArtifactPortSpec {
  string name = 1;

  int32 port = 2;
}

message InfraSpec {
  string resource = 1;

  string profile = 2;

  string name = 3;

  string app = 4;

  InfraPersistenceSpec persistence = 5;
}

message InfraPersistenceSpec {
  bool enabled = 1;
}

message ArtifactHTTPSpec {
  repeated string hostnames = 1;

  repeated HTTPRouteRule matches = 2;
}

message HTTPRouteRule {
  string backend = 1;

  HTTPPathRule path = 2;
}

message HTTPPathRule {
  HTTPPathRuleType type = 1;

  string value = 2;
}

enum HTTPPathRuleType {
  HTTP_PATH_RULE_TYPE_UNSPECIFIED = 0;
  HTTP_PATH_RULE_TYPE_PATH_PREFIX = 1;
}

enum WorkloadKind {
  WORKLOAD_KIND_UNSPECIFIED = 0;
  WORKLOAD_KIND_STATELESS = 1;
  WORKLOAD_KIND_STATEFUL = 2;
}

message GetEnvironmentRequest {
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "infra.liukexin.com/deploy/Environment"
    }
  ];
}

message GetServiceEndpointsRequest {
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "infra.liukexin.com/deploy/ServiceEndpoints"
    }
  ];

  ServiceEndpointsView view = 2 [(google.api.field_behavior) = OPTIONAL];
}

message ListEnvironmentsRequest {
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "infra.liukexin.com/deploy/Environment"
    }
  ];

  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  string filter = 4 [(google.api.field_behavior) = OPTIONAL];
}

message ListEnvironmentsResponse {
  repeated Environment environments = 1;

  string next_page_token = 2;
}

message CreateEnvironmentRequest {
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "infra.liukexin.com/deploy/Environment"
    }
  ];

  string env_name = 2 [(google.api.field_behavior) = REQUIRED];

  Environment environment = 3 [(google.api.field_behavior) = REQUIRED];
}

message UpdateEnvironmentRequest {
  Environment environment = 1 [(google.api.field_behavior) = REQUIRED];

  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = REQUIRED];
}

message DeleteEnvironmentRequest {
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "infra.liukexin.com/deploy/Environment"
    }
  ];
}
