name: infra.default
desc: "deploy service environment"
services:
  - infra:
      app: deploy
      resource: mongodb
      profile: dev-single
      name: mongo
      persistence:
        enabled: true
  - artifact:
      path: //projects/infra/deploy/service.yaml
      name: service-iface
    http:
      hostnames:
        - infra.liukexin.com
      matches:
        - backend: http
          path:
            type: PathPrefix
            value: /v1/deploy
