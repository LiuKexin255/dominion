  namespace: default
  labels:
    app.kubernetes.io/name: deploy
    app.kubernetes.io/component: manager
    dominion.io/environment: infra.default
    app.kubernetes.io/managed-by: dominion.io
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deploy
      app.kubernetes.io/component: manager
      dominion.io/environment: infra.default
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deploy
        app.kubernetes.io/component: manager
        dominion.io/environment: infra.default
        app.kubernetes.io/managed-by: dominion.io
    spec:
      containers:
        - name: dp-deploy-manager-847070f8
          image: registry.liukexin.com/projects/infra/deploy@sha256:b8e61f3315babf6138c7508ad611edb97aa8ae5f2be5f61b1cbc93d9af2a1b17
          ports:
            - name: grpc
              containerPort: 8080
            - name: http
