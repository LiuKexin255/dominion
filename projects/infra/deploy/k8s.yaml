metadata:
  name: secret-deploy-mongo-847070f8
  namespace: default
  labels:
    app.kubernetes.io/name: deploy
    app.kubernetes.io/component: mongo
    dominion.io/environment: infra.default
    app.kubernetes.io/managed-by: dominion.io
type: Opaque
data:
  username: YWRtaW4=
  password: Y2RYVWo3U25TeDZucm5GQ0lrdmkyQXB4Q2ZzYjFNSVk=
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-deploy-mongo-847070f8
  namespace: default
  labels:
    app.kubernetes.io/name: deploy
    app.kubernetes.io/component: mongo
    dominion.io/environment: infra.default
    app.kubernetes.io/managed-by: dominion.io
