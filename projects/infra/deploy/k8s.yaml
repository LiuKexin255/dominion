    requests:
      storage: 16Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deploy-mongo-847070f8
  namespace: default
  labels:
    app.kubernetes.io/name: deploy
    app.kubernetes.io/component: mongo
    dominion.io/environment: infra.default
    app.kubernetes.io/managed-by: dominion.io
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deploy
      app.kubernetes.io/component: mongo
      dominion.io/environment: infra.default
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deploy
        app.kubernetes.io/component: mongo
        dominion.io/environment: infra.default
        app.kubernetes.io/managed-by: dominion.io
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: pvc-deploy-mongo-847070f8
      initContainers:
        - name: mongo-init
          image: mongo:7.0
          command:
            - bash
            - -ec
            - |
              set -euo pipefail

              shutdown_mongod() {
                if [ -f "/tmp/mongod-init.pid" ]; then
                  mongod --dbpath "/data/db" --shutdown >/dev/null 2>&1 || true
                fi
              }

              trap shutdown_mongod EXIT

              mongod --bind_ip "127.0.0.1" --port 27017 --dbpath "/data/db" --fork --logpath "/tmp/mongod-init.log" --pidfilepath "/tmp/mongod-init.pid" --auth

              until mongosh --host "127.0.0.1" --port 27017 --quiet --eval 'db.adminCommand({ ping: 1 })' >/dev/null 2>&1; do
                sleep 1
              done

              if [ ! -f "/data/db/.admin-initialized" ]; then
                mongosh --host "127.0.0.1" --port 27017 --quiet --eval 'db.getSiblingDB("admin").createUser({user: process.env.MONGO_INITDB_ROOT_USERNAME, pwd: process.env.MONGO_INITDB_ROOT_PASSWORD, roles: [{role: "root", db: "admin"}]})'
                touch "/data/db/.admin-initialized"
                exit 0
              fi

              mongosh --host "127.0.0.1" --port 27017 --username "$MONGO_INITDB_ROOT_USERNAME" --password "$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase "admin" --quiet --eval 'db.adminCommand({ ping: 1 })' >/dev/null
          env:
            - name: SERVICE_APP
              value: deploy
            - name: DOMINION_ENVIRONMENT
              value: infra.default
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: secret-deploy-mongo-847070f8
                  key: username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret-deploy-mongo-847070f8
                  key: password
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      containers:
        - name: mongo-deploy-mongo-847070f8
          image: mongo:7.0
          ports:
            - name: mongo
              containerPort: 27017
          env:
            - name: SERVICE_APP
              value: deploy
            - name: DOMINION_ENVIRONMENT
              value: infra.default
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: secret-deploy-mongo-847070f8
                  key: username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret-deploy-mongo-847070f8
                  key: password
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          livenessProbe:
            tcpSocket:
              port: mongo
          readinessProbe:
            tcpSocket:
              port: mongo
---
apiVersion: v1
kind: Service
metadata:
  name: svc-deploy-mongo-847070f8
  namespace: default
  labels:
    app.kubernetes.io/name: deploy
    app.kubernetes.io/component: mongo
    dominion.io/environment: infra.default
    app.kubernetes.io/managed-by: dominion.io
spec:
  selector:
    app.kubernetes.io/name: deploy
    app.kubernetes.io/component: mongo
    dominion.io/environment: infra.default
  ports:
    - name: mongo
      port: 27017
      targetPort: mongo
---
