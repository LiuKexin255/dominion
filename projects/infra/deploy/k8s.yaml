# Deploy service 的原生 Kubernetes 部署清单。
# 等效于 prod_deploy.yaml 经 deploy 工具生成的资源，用于 deploy 服务自身的自举部署。

---
apiVersion: v1
kind: Secret
metadata:
  name: secret-deploy-mongo-847070f8
  namespace: kube-public
  labels:
    app.kubernetes.io/name: deploy
    app.kubernetes.io/component: mongo
    dominion.io/environment: infra.deploy
    app.kubernetes.io/managed-by: dominion.io
type: Opaque
data:
  username: YWRtaW4=
  password: OU1DVXhyZTh0emxWejZpR0NENHJMSzRaOXVNeTNqMEw=
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-deploy-mongo-847070f8
  namespace: kube-public
  labels:
    app.kubernetes.io/name: deploy
    app.kubernetes.io/component: mongo
    dominion.io/environment: infra.deploy
    app.kubernetes.io/managed-by: dominion.io
spec:
  storageClassName: nfs-csi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
