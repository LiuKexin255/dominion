namespace: "default"
managed_by: "dominion.io"
gateway:
  name: "traefik-gateway"
  namespace: "ingress"
tls:
  secret: "my-https-cert"
  domain: "tls.liukexin.com"
  ca_config_map:
    name: "my-ca.crt"
    key: "ca.crt"
oss:
  secret: "seaweedfs-s3-credentials"
  access_key: "accessKey"
  secret_key: "secretKey"
mongodb:
  dev-single:
    image: "mongo"
    version: "7.0"
    port: 27017
    admin_username: "admin"
    security:
      run_as_user: 1000
      run_as_group: 3000
    storage:
      storage_class_name: "nfs-csi"
      capacity: "16Gi"
      access_modes:
        - "ReadWriteOnce"
      volume_mode: "Filesystem"
