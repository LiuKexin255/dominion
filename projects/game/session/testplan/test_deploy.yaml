name: game.lt
desc: "game-session HTTP interface large test"
type: test
services:
  - infra:
      app: game
      resource: mongodb
      profile: dev-single
      name: mongo
  - artifact:
      path: //projects/game/gateway/service.yaml
      name: cmd
      env:
        SESSION_TOKEN_SECRET: "dev-session-token-secret"
  - artifact:
      path: //projects/game/session/service.yaml
      name: cmd
      env:
        SESSION_TOKEN_SECRET: "dev-session-token-secret"
    http:
      hostnames:
        - game.liukexin.com
      matches:
        - backend: http
          path:
            type: PathPrefix
            value: /v1
